name: Update Story Manifest

on:
  push:
    paths:
      - 'docs/stories/*.json'
      - '!docs/stories/manifest.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run manifest update script
        run: python src/update_manifest.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/stories/manifest.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update story manifest" && git push)
